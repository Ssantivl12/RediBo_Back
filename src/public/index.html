<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba WebSocket</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
    }
    h1 {
      color: #4CAF50;
    }
    #messages {
      margin-top: 20px;
    }
    .message {
      background-color: #f1f1f1;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>Prueba WebSocket</h1>
  <button id="connectButton">Conectar al WebSocket</button>
  <button id="sendMessageButton" disabled>Enviar Mensaje</button>
  <div id="messages"></div>

  <script>
    let socket;

    // Conectar al servidor WebSocket
    document.getElementById('connectButton').addEventListener('click', () => {
      socket = new WebSocket('ws://localhost:3000');  // Asegúrate de que el puerto sea el correcto

      socket.onopen = () => {
        document.getElementById('sendMessageButton').disabled = false;
        logMessage('🟢 Conectado al servidor WebSocket');
      };

      socket.onmessage = (event) => {
        logMessage(`Mensaje del servidor: ${event.data}`);
      };

      socket.onclose = () => {
        logMessage('🔴 Conexión cerrada');
      };

      socket.onerror = (error) => {
        logMessage(`Error en WebSocket: ${error.message}`);
      };
    });

    // Enviar mensaje al servidor WebSocket
    document.getElementById('sendMessageButton').addEventListener('click', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        const message = '¡Hola desde el navegador!';
        socket.send(message);
        logMessage(`Mensaje enviado al servidor: ${message}`);
      } else {
        logMessage('No hay conexión WebSocket activa');
      }
    });

    // Mostrar los mensajes en el contenedor
    function logMessage(message) {
      const messageElement = document.createElement('div');
      messageElement.className = 'message';
      messageElement.textContent = message;
      document.getElementById('messages').appendChild(messageElement);
    }
  </script>
  
</body>
</html>
